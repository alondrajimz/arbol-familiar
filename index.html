const {useState,useCallback,useRef,useEffect}=React;

/* ── helpers ── */
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function calcAge(birth,death){
  if(!birth)return null;
  const b=new Date(birth),d=death?new Date(death):new Date();
  if(isNaN(b))return null;
  let a=d.getFullYear()-b.getFullYear();
  if(d.getMonth()<b.getMonth()||(d.getMonth()===b.getMonth()&&d.getDate()<b.getDate()))a--;
  return a>=0?a:null;
}
function getDisplay(m){
  const first=m.firstName||(m.name?m.name.split(" ")[0]:"");
  const l1=m.lastName1||(m.name?m.name.split(" ")[1]||"":"");
  const l2=m.lastName2||(m.name?m.name.split(" ").slice(2).join(" "):"");
  return {first,last:([l1,l2].filter(Boolean).join(" ")),full:([first,l1,l2].filter(Boolean).join(" "))};
}
function parsePartners(p){if(!p)return[];if(Array.isArray(p))return p;return Object.values(p);}

/* ── LAYOUT ALGORITHM ── */
function autoLayout(members){
  try{
  if(!members.length)return members;
  const m=members.map(x=>({...x}));
  const byId=Object.fromEntries(m.map(x=>[x.id,x]));

  // Step 1: gen 0 = roots, children = parent gen + 1
  const gen={};
  m.forEach(x=>{if(!x.parent1Id&&!x.parent2Id)gen[x.id]=0;});
  let chg=true,it=0;
  while(chg&&it++<100){chg=false;m.forEach(x=>{
    if(gen[x.id]!=null)return;
    const gs=[x.parent1Id,x.parent2Id].filter(Boolean).map(id=>gen[id]).filter(g=>g!=null);
    if(gs.length){gen[x.id]=Math.max(...gs)+1;chg=true;}
  });}
  m.forEach(x=>{if(gen[x.id]==null)gen[x.id]=0;});

  // Steps 2-4 in one outer loop until stable (max 100 passes)
  chg=true;it=0;
  while(chg&&it++<100){
    chg=false;
    // Partners → same gen (min of the two = higher in tree)
    m.forEach(x=>parsePartners(x.partnerships).forEach(pr=>{
      if(gen[pr.partnerId]==null)return;
      const g=Math.min(gen[x.id],gen[pr.partnerId]);
      if(gen[x.id]!==g){gen[x.id]=g;chg=true;}
      if(gen[pr.partnerId]!==g){gen[pr.partnerId]=g;chg=true;}
    }));
    // Siblings → same gen (max = deepest sibling's row, keeps all on one row)
    const sibs={};
    m.forEach(x=>[x.parent1Id,x.parent2Id].filter(Boolean).forEach(pid=>{
      if(!sibs[pid])sibs[pid]=[];
      if(!sibs[pid].includes(x.id))sibs[pid].push(x.id);
    }));
    Object.values(sibs).forEach(ids=>{
      const parentGens=ids.map(id=>{const x=byId[id];const gs=[x.parent1Id,x.parent2Id].filter(Boolean).map(p=>gen[p]).filter(g=>g!=null);return gs.length?Math.max(...gs)+1:gen[id]??0;});
      const targetG=Math.max(...parentGens);
      ids.forEach(id=>{if((gen[id]??0)!==targetG){gen[id]=targetG;chg=true;}});
    });
    // Children strictly below every parent
    m.forEach(x=>{
      const gs=[x.parent1Id,x.parent2Id].filter(Boolean).map(id=>gen[id]).filter(g=>g!=null);
      if(!gs.length)return;
      const n=Math.max(...gs)+1;
      if((gen[x.id]??0)<n){gen[x.id]=n;chg=true;}
    });
  }

  const CG=100; // couple center-to-center (70px avatar + 30px gap)
  const MG=160; // gap between members of same family
  const FG=220; // gap between different families
  const maxG=Math.max(...Object.values(gen),0);
  const posX={};

  // Build family key for each member: sorted parent ids
  function famKey(x){return[x.parent1Id||"",x.parent2Id||""].sort().join("|");}
  // Direct children of a specific person (not via their partner)
  function directKids(id){return m.filter(c=>c.parent1Id===id||c.parent2Id===id);}

  // X positions: bottom-up, generation by generation
  for(let g=maxG;g>=0;g--){
    const gms=m.filter(x=>gen[x.id]===g);

    // A) Group by family (same parents), sort each family by birthDate
    const famMap={};
    gms.forEach(x=>{
      const k=famKey(x);
      if(!famMap[k])famMap[k]=[];
      famMap[k].push(x);
    });
    Object.values(famMap).forEach(fam=>fam.sort((a,b)=>(a.birthDate||"").localeCompare(b.birthDate||"")));

    // Sort families by earliest birthDate in the family (applies to all generations)
    const famKeys=Object.keys(famMap).sort((ka,kb)=>{
      const aDate=famMap[ka].map(x=>x.birthDate||"9999").sort()[0];
      const bDate=famMap[kb].map(x=>x.birthDate||"9999").sort()[0];
      return aDate.localeCompare(bDate);
    });

    // For each family, build couple/single units
    function buildUnits(fam){
      const done=new Set();const units=[];
      fam.forEach(x=>{
        if(done.has(x.id))return;done.add(x.id);
        const pr=parsePartners(x.partnerships).sort((a,b)=>(a.type==="actual"?0:1)-(b.type==="actual"?0:1)).find(p=>byId[p.partnerId]&&gen[p.partnerId]===g&&!done.has(p.partnerId));
        if(pr){
          const pm=byId[pr.partnerId];done.add(pm.id);
          const mLeft=x.gender==="M"||(x.gender!=="F"&&pm.gender==="F");
          units.push({couple:true,ids:mLeft?[x.id,pm.id]:[pm.id,x.id]});
        } else {
          units.push({couple:false,ids:[x.id]});
        }
      });
      return units;
    }

    if(g===maxG){
      // C) Bottom generation: lay out families sequentially with FG between families
      let cur=80;
      famKeys.forEach((fk,fi)=>{
        const units=buildUnits(famMap[fk]);
        units.forEach(u=>{
          if(u.couple){
            posX[u.ids[0]]=cur;
            posX[u.ids[1]]=cur+CG;
            cur+=CG+MG;
          } else {
            posX[u.ids[0]]=cur;
            cur+=MG;
          }
        });
        cur+=FG-MG; // extra gap between families
      });
    } else {
      // D) Upper generations: build units across ALL members of this gen so
      // couples with different-family parents are correctly paired
      const allMembers=[];famKeys.forEach(fk=>famMap[fk].forEach(x=>allMembers.push(x)));
      const allUnits=buildUnits(allMembers);
      allUnits.sort((a,b)=>{
        function avgChildX(u){const xs=[];u.ids.forEach(id=>directKids(id).forEach(c=>{if(posX[c.id]!=null)xs.push(posX[c.id]);}));return xs.length?xs.reduce((s,v)=>s+v)/xs.length:Infinity;}
        return avgChildX(a)-avgChildX(b);
      });

      let cur=80;
      allUnits.forEach(u=>{
        // Ideal X = midpoint of this unit's own direct children
        const childXs=[];
        u.ids.forEach(id=>directKids(id).forEach(c=>{if(posX[c.id]!=null&&!childXs.includes(posX[c.id]))childXs.push(posX[c.id]);}));
        const ideal=childXs.length?(Math.min(...childXs)+Math.max(...childXs))/2:null;

        if(u.couple){
          const cx=Math.max(ideal??cur+CG/2, cur+CG/2);
          posX[u.ids[0]]=cx-CG/2;
          posX[u.ids[1]]=cx+CG/2;
          cur=cx+CG/2+MG;
        } else {
          const x=Math.max(ideal??cur, cur);
          posX[u.ids[0]]=x;
          cur=x+MG;
        }
      });
    }
  }

  // E) Center everything horizontally
  const allXs=Object.values(posX);
  if(allXs.length){
    const mid=(Math.min(...allXs)+Math.max(...allXs))/2;
    const shift=80-Math.min(...allXs);
    Object.keys(posX).forEach(id=>{posX[id]+=shift;});
  }

  m.forEach(x=>{x.x=posX[x.id]??80;x.y=(gen[x.id]??0)*220+100;});
  return m;
  }catch(e){console.error("autoLayout error:",e);return members.map((p,i)=>({...p,x:100+i*160,y:100}));}
}

/* ── Firebase helpers ── */
function savePhotos(members){
  const photos={};
  members.forEach(m=>{if(m.photo)photos[m.id]=m.photo;});
  try{localStorage.setItem("family-photos",JSON.stringify(photos));}catch(e){}
}
function loadPhotos(){
  try{return JSON.parse(localStorage.getItem("family-photos")||"{}");}catch(e){return{};}
}
function stripPhotos(members){
  return members.map(m=>{const c={...m};delete c.photo;return c;});
}
function saveToDB(members){
  const data={};
  stripPhotos(members).forEach(m=>{data[m.id]=m;});
  return dbRef.set(data);
}

/* ── Components ── */
function Avatar({photo,name,size=70,gender,deceased}){
  const ini=(name||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const grad=gender==="F"?"linear-gradient(135deg,#FF2D55,#FF6482)":"linear-gradient(135deg,#007AFF,#5AC8FA)";
  return <div style={{width:size,height:size,borderRadius:size/2,
    background:photo?`url(${photo}) center/cover no-repeat`:grad,
    display:"flex",alignItems:"center",justifyContent:"center",
    color:"#fff",fontSize:size*.3,fontWeight:600,
    border:deceased?"3px solid #999":`3px solid ${gender==="F"?"#FF2D55":"#007AFF"}`,
    filter:deceased?"grayscale(100%) opacity(0.7)":"none",
    margin:"0 auto"}}>{!photo&&ini}</div>;
}

function PersonNode({m,onTap}){
  const d=getDisplay(m);
  const age=calcAge(m.birthDate,m.deceased?m.deathDate:null);
  return (
    <foreignObject x={m.x-75} y={m.y-55} width={150} height={130}>
      <div onClick={()=>onTap(m.id)} style={{textAlign:"center",cursor:"pointer",padding:"4px 0"}}>
        <Avatar photo={m.photo} name={d.full} size={70} gender={m.gender} deceased={m.deceased}/>
        <div style={{marginTop:4,fontSize:14,fontWeight:700,color:m.deceased?"#888":"#000"}}>
          {m.deceased?"† ":""}{d.first}
        </div>
        {d.last&&<div style={{fontSize:11,color:"#666"}}>{d.last}</div>}
        {age!==null&&<div style={{fontSize:11,color:"#999"}}>{age} años</div>}
      </div>
    </foreignObject>
  );
}

function TreeLines({members}){
  const lines=[];
  const byId=Object.fromEntries(members.map(m=>[m.id,m]));
  const drawn=new Set();

  // Couple lines (horizontal)
  members.forEach(m=>{
    parsePartners(m.partnerships).forEach(pr=>{
      const key=[m.id,pr.partnerId].sort().join("-");
      if(drawn.has(key))return;drawn.add(key);
      const sp=byId[pr.partnerId];if(!sp)return;
      if(Math.abs(m.y-sp.y)>10)return; // not same row
      const x1=Math.min(m.x,sp.x)+35,x2=Math.max(m.x,sp.x)-35;
      const y=m.y;
      lines.push(<line key={`couple-${key}`} x1={x1} y1={y} x2={x2} y2={y}
        stroke={pr.type==="anterior"?"#ccc":"#bbb"} strokeWidth={2}
        strokeDasharray={pr.type==="anterior"?"5 4":"none"}/>);
    });
  });

  // Parent-child lines (straight H+V)
  // Group children by parent pair
  const familyGroups={};
  members.forEach(c=>{
    if(!c.parent1Id&&!c.parent2Id)return;
    const key=[c.parent1Id||"",c.parent2Id||""].sort().join("|");
    if(!familyGroups[key])familyGroups[key]={parents:[c.parent1Id,c.parent2Id].filter(Boolean),children:[]};
    familyGroups[key].children.push(c);
  });

  Object.values(familyGroups).forEach(fam=>{
    const parents=fam.parents.map(id=>byId[id]).filter(Boolean);
    const children=fam.children;
    if(!parents.length||!children.length)return;

    // Parent anchor point: center between parents (or single parent)
    const parentCenterX=parents.reduce((s,p)=>s+p.x,0)/parents.length;
    const parentY=parents[0].y+55; // bottom of parent card

    // Child top Y
    const childY=children[0].y-55;
    const midY=(parentY+childY)/2;

    // Vertical line from parents down to mid
    lines.push(<line key={`pv-${fam.parents.join("-")}`}
      x1={parentCenterX} y1={parentY} x2={parentCenterX} y2={midY}
      stroke="#bbb" strokeWidth={2}/>);

    // Horizontal bar at midY spanning all children
    const childXs=children.map(c=>c.x).sort((a,b)=>a-b);
    const barLeft=Math.min(parentCenterX,childXs[0]);
    const barRight=Math.max(parentCenterX,childXs[childXs.length-1]);

    if(children.length>1||Math.abs(parentCenterX-childXs[0])>5){
      lines.push(<line key={`ph-${fam.parents.join("-")}`}
        x1={barLeft} y1={midY} x2={barRight} y2={midY}
        stroke="#bbb" strokeWidth={2}/>);
    }

    // Vertical lines from bar down to each child
    children.forEach(c=>{
      lines.push(<line key={`cv-${c.id}`}
        x1={c.x} y1={midY} x2={c.x} y2={childY}
        stroke="#bbb" strokeWidth={2}/>);
    });
  });

  return <>{lines}</>;
}

function Inp({value,onChange,placeholder,type="text"}){

}
function PhotoUpload({photo,gender,name,onUp}){
  const inp=useRef(null);
  const go=e=>{const f=e.target.files?.[0];if(!f)return;
    const img=new Image(),reader=new FileReader();
    reader.onload=ev=>{img.onload=()=>{
      const c=document.createElement("canvas");const max=200;
      let w=img.width,h=img.height;
      if(w>h){if(w>max){h=h*(max/w);w=max;}}else{if(h>max){w=w*(max/h);h=max;}}
      c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
      onUp(c.toDataURL("image/jpeg",0.7));
    };img.src=ev.target.result;};reader.readAsDataURL(f);};
  return <div onClick={()=>inp.current?.click()} style={{textAlign:"center",cursor:"pointer",padding:12}}>
    <Avatar photo={photo} name={name||"?"} size={80} gender={gender}/>
    <div style={{color:"#007AFF",fontSize:13,fontWeight:500,marginTop:6}}>{photo?"Cambiar foto":"Agregar foto"}</div>
    <input ref={inp} type="file" accept="image/*" onChange={go} style={{display:"none"}}/>
  </div>;
}

/* ── Main App ── */
function App(){
  const [members,setMembers]=useState([]);
  const [sel,setSel]=useState(null);
  const [panel,setPanel]=useState(null); // "view"|"edit"|"add"|"partners"
  const [form,setForm]=useState({});
  const [pForm,setPForm]=useState({partnerId:"",type:"actual"});
  const [toast,setToast]=useState(null);
  const [zoom,setZoom]=useState(1);
  const [loading,setLoading]=useState(true);
  const isLocal=useRef(false);
  const autoSaveTimer=useRef(null);

  const flash=msg=>{setToast(msg);setTimeout(()=>setToast(null),2000);};

  // Load from Firebase
  useEffect(()=>{
    dbRef.on("value",snap=>{
      if(isLocal.current){isLocal.current=false;return;}
      const val=snap.val();
      if(!val){setLoading(false);return;}
      const photos=loadPhotos();
      const arr=Object.entries(val).map(([k,v])=>({
        ...v,id:v.id||k,
        partnerships:parsePartners(v.partnerships),
        photo:photos[v.id||k]||null
      }));
      setMembers(autoLayout(arr));
      setLoading(false);
    });
    return ()=>dbRef.off();
  },[]);

  // Auto save
  const doSave=useCallback((data)=>{
    savePhotos(data);
    isLocal.current=true;
    saveToDB(data).then(()=>flash("Guardado ✓")).catch(()=>flash("Error al guardar"));
  },[]);

  const update=useCallback(fn=>{
    setMembers(prev=>{
      const next=autoLayout(typeof fn==="function"?fn(prev):fn);
      if(autoSaveTimer.current)clearTimeout(autoSaveTimer.current);
      autoSaveTimer.current=setTimeout(()=>doSave(next),2000);
      return next;
    });
  },[doSave]);

  const selM=members.find(m=>m.id===sel);

  // Open panels
  const tapCard=id=>{setSel(id);setPanel("view");};
  const openAdd=()=>{setForm({firstName:"",lastName1:"",lastName2:"",birthDate:"",birthPlace:"",gender:"M",deceased:false,deathDate:"",deathPlace:"",residence:"",phone:"",email:"",facebook:"",instagram:"",parent1Id:"",parent2Id:"",photo:null});setPanel("add");};
  const openEdit=()=>{if(!selM)return;setForm({...selM});setPanel("edit");};
  const openPartners=()=>{if(!selM)return;setPForm({partnerId:"",type:"actual"});setPanel("partners");};

  const saveForm=()=>{
    if(!form.firstName?.trim())return;
    if(panel==="add"){
      const n={...form,id:genId(),partnerships:[]};
      update(p=>[...p,n]);
    } else {
      update(p=>p.map(m=>m.id===sel?{...m,...form}:m));
    }
    setPanel(null);
  };

  const addPartner=()=>{
    if(!sel||!pForm.partnerId)return;
    update(p=>p.map(m=>{
      if(m.id===sel){const ps=[...m.partnerships];if(!ps.find(x=>x.partnerId===pForm.partnerId))ps.push({partnerId:pForm.partnerId,type:pForm.type});return{...m,partnerships:ps};}
      if(m.id===pForm.partnerId){const ps=[...m.partnerships];if(!ps.find(x=>x.partnerId===sel))ps.push({partnerId:sel,type:pForm.type});return{...m,partnerships:ps};}
      return m;
    }));
    setPForm({partnerId:"",type:"actual"});
  };

  const removePartner=pid=>{
    update(p=>p.map(m=>{
      if(m.id===sel)return{...m,partnerships:m.partnerships.filter(x=>x.partnerId!==pid)};
      if(m.id===pid)return{...m,partnerships:m.partnerships.filter(x=>x.partnerId!==sel)};
      return m;
    }));
  };

  const removePerson=()=>{
    if(!sel||!confirm("¿Eliminar a esta persona?"))return;
    isLocal.current=true;
    dbRef.child(sel).remove();
    update(p=>p.filter(m=>m.id!==sel).map(m=>({...m,
      parent1Id:m.parent1Id===sel?null:m.parent1Id,
      parent2Id:m.parent2Id===sel?null:m.parent2Id,
      partnerships:m.partnerships.filter(x=>x.partnerId!==sel)})));
    setSel(null);setPanel(null);
  };

  const manualSave=()=>{
    savePhotos(members);isLocal.current=true;
    saveToDB(members).then(()=>flash("Guardado ✓")).catch(()=>flash("Error"));
  };

  // SVG dimensions
  const allX=members.map(m=>m.x);
  const allY=members.map(m=>m.y);
  const svgW=members.length?Math.max(...allX)+200:800;
  const svgH=members.length?Math.max(...allY)+200:600;

  const fit=()=>{if(!members.length)return;const xs=members.map(m=>m.x);const ys=members.map(m=>m.y);const tw=Math.max(...xs)-Math.min(...xs)+300;const th=Math.max(...ys)-Math.min(...ys)+300;const vw=window.innerWidth;const vh=window.innerHeight-60;setZoom(Math.min(vw/tw,vh/th,1));};
  useEffect(()=>{if(members.length>0){const xs=members.map(m=>m.x);const ys=members.map(m=>m.y);const tw=Math.max(...xs)-Math.min(...xs)+300;const th=Math.max(...ys)-Math.min(...ys)+300;const vw=window.innerWidth;const vh=window.innerHeight-60;setZoom(Math.min(vw/tw,vh/th,1));}},[members.length]);

  if(loading)return <div style={{width:"100%",height:"100vh",background:"#F2F2F7",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
    <span style={{fontSize:48}}>🌳</span><span style={{color:"rgba(60,60,67,0.6)",fontSize:16}}>Cargando…</span></div>;

  const sheet=(title,onClose,content)=><>
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",zIndex:50}}/>
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:60,background:"#F2F2F7",borderRadius:"14px 14px 0 0",maxHeight:"90vh",overflowY:"auto",paddingBottom:"env(safe-area-inset-bottom,20px)",animation:"sheetUp .3s ease-out"}}>
      <div style={{display:"flex",justifyContent:"center",padding:"10px 0 2px"}}><div style={{width:36,height:5,borderRadius:3,background:"rgba(60,60,67,0.15)"}}/></div>
      <div style={{display:"flex",justifyContent:"space-between",padding:"6px 20px 10px"}}>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#007AFF",fontSize:17,cursor:"pointer"}}>Cerrar</button>
        <span style={{fontSize:17,fontWeight:600}}>{title}</span>
        <div style={{width:50}}/>
      </div>
      <div style={{padding:"0 20px 24px"}}>{content}</div>
    </div>
  </>;

  const close=()=>setPanel(null);

  return <div style={{width:"100%",height:"100vh",background:"#F2F2F7",display:"flex",flexDirection:"column",overflow:"hidden"}}>
    {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:200,background:"rgba(0,0,0,.75)",color:"#fff",padding:"10px 24px",borderRadius:100,fontSize:14,fontWeight:500,animation:"fadeIn .25s ease"}}>{toast}</div>}

    {/* Header */}
    <div style={{padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"0.5px solid rgba(60,60,67,0.12)",background:"rgba(249,249,249,0.9)",backdropFilter:"blur(20px)",zIndex:10}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:22}}>🌳</span>
        <span style={{fontSize:18,fontWeight:700}}>Mi Familia</span>
        <span style={{fontSize:12,color:"rgba(60,60,67,0.6)"}}>{members.length}</span>
      </div>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>setZoom(z=>Math.min(z+0.15,2.5))} style={{width:32,height:32,borderRadius:16,border:"none",background:"rgba(120,120,128,0.12)",fontSize:18,cursor:"pointer"}}>+</button>
        <button onClick={()=>setZoom(z=>Math.max(z-0.15,0.2))} style={{width:32,height:32,borderRadius:16,border:"none",background:"rgba(120,120,128,0.12)",fontSize:18,cursor:"pointer"}}>−</button>
        <button onClick={fit} style={{padding:"0 12px",height:32,borderRadius:16,border:"none",background:"rgba(120,120,128,0.12)",fontSize:13,fontWeight:500,cursor:"pointer"}}>Ajustar</button>
        <button onClick={manualSave} style={{padding:"0 12px",height:32,borderRadius:16,border:"none",background:"#34C759",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>Guardar</button>
        <button onClick={openAdd} style={{padding:"0 12px",height:32,borderRadius:16,border:"none",background:"#007AFF",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Agregar</button>
      </div>
    </div>

    {/* Canvas */}
    <div style={{flex:1,overflow:"auto",background:"#F2F2F7"}}>
      <svg width={svgW*zoom} height={svgH*zoom} style={{display:"block"}}>
        <g transform={`scale(${zoom})`}>
          <TreeLines members={members}/>
          {members.map(m=><PersonNode key={m.id} m={m} onTap={tapCard}/>)}
        </g>
      </svg>
    </div>

    {/* View profile */}
    {panel==="view"&&selM&&sheet(getDisplay(selM).full,close,<div style={{display:"flex",flexDirection:"column",gap:8}}>
      <div style={{textAlign:"center",padding:8}}>
        <Avatar photo={selM.photo} name={getDisplay(selM).full} size={100} gender={selM.gender} deceased={selM.deceased}/>
        <div style={{fontSize:20,fontWeight:700,marginTop:8}}>{selM.deceased?"† ":""}{getDisplay(selM).full}</div>
        {calcAge(selM.birthDate,selM.deceased?selM.deathDate:null)!==null&&<div style={{color:"#888",fontSize:14}}>{calcAge(selM.birthDate,selM.deceased?selM.deathDate:null)} años</div>}
      </div>
      <div style={{background:"#fff",borderRadius:12,overflow:"hidden"}}>
        {selM.birthDate&&<div style={{padding:"10px 14px",borderBottom:"0.5px solid rgba(60,60,67,0.12)"}}><span style={{color:"#888",fontSize:12}}>Nacimiento</span><div>{selM.birthDate}{selM.birthPlace?` · ${selM.birthPlace}`:""}</div></div>}
        {selM.residence&&<div style={{padding:"10px 14px",borderBottom:"0.5px solid rgba(60,60,67,0.12)"}}><span style={{color:"#888",fontSize:12}}>Residencia</span><div>{selM.residence}</div></div>}
        {selM.deceased&&<div style={{padding:"10px 14px"}}><span style={{color:"#888",fontSize:12}}>Fallecimiento</span><div>{selM.deathDate||""}{selM.deathPlace?` · Restos: ${selM.deathPlace}`:""}</div></div>}
      </div>
      {(selM.phone||selM.email||selM.facebook||selM.instagram)&&<div style={{display:"flex",justifyContent:"center",gap:12,padding:8}}>
        {selM.phone&&<a href={`tel:${selM.phone}`} style={{width:44,height:44,borderRadius:22,background:"#34C759",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:20}}>📞</span></a>}
        {selM.email&&<a href={`mailto:${selM.email}`} style={{width:44,height:44,borderRadius:22,background:"#007AFF",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:20}}>✉️</span></a>}
        {selM.facebook&&<a href={selM.facebook.startsWith("http")?selM.facebook:`https://facebook.com/${selM.facebook}`} target="_blank" style={{width:44,height:44,borderRadius:22,background:"#1877F2",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:16,fontWeight:800}}>f</span></a>}
        {selM.instagram&&<a href={selM.instagram.startsWith("http")?selM.instagram:`https://instagram.com/${selM.instagram}`} target="_blank" style={{width:44,height:44,borderRadius:22,background:"linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:"#fff",fontSize:16,fontWeight:700}}>ig</span></a>}
      </div>}
      <div style={{display:"flex",gap:8,padding:"8px 0"}}>
        <button onClick={openEdit} style={{flex:1,padding:"12px 0",background:"#007AFF",border:"none",borderRadius:12,color:"#fff",fontSize:16,fontWeight:600,cursor:"pointer"}}>Editar</button>
        <button onClick={openPartners} style={{flex:1,padding:"12px 0",background:"#34C759",border:"none",borderRadius:12,color:"#fff",fontSize:16,fontWeight:600,cursor:"pointer"}}>Parejas</button>
        <button onClick={removePerson} style={{padding:"12px 16px",background:"#FF3B30",border:"none",borderRadius:12,color:"#fff",fontSize:16,fontWeight:600,cursor:"pointer"}}>Eliminar</button>
      </div>
    </div>)}

    {/* Add/Edit form */}
    {(panel==="add"||panel==="edit")&&sheet(panel==="add"?"Agregar":"Editar",close,<div>
      <PhotoUpload photo={form.photo} gender={form.gender} name={form.firstName} onUp={d=>setForm({...form,photo:d})}/>
      <Toggle value={form.gender==="F"} onChange={v=>setForm({...form,gender:v?"F":"M"})} labelA="Masculino" labelB="Femenino"/>
      <SecTitle>Nombre</SecTitle>
      <Inp value={form.firstName} onChange={e=>setForm({...form,firstName:e.target.value})} placeholder="Nombre(s)"/>
      <Inp value={form.lastName1} onChange={e=>setForm({...form,lastName1:e.target.value})} placeholder="Apellido paterno"/>
      <Inp value={form.lastName2} onChange={e=>setForm({...form,lastName2:e.target.value})} placeholder="Apellido materno"/>
      <SecTitle>Nacimiento</SecTitle>
      <Inp type="date" value={form.birthDate} onChange={e=>setForm({...form,birthDate:e.target.value})}/>
      <Inp value={form.birthPlace} onChange={e=>setForm({...form,birthPlace:e.target.value})} placeholder="Lugar de nacimiento"/>
      <SecTitle>Residencia</SecTitle>
      <Inp value={form.residence} onChange={e=>setForm({...form,residence:e.target.value})} placeholder="Lugar de residencia actual"/>
      <SecTitle>Contacto</SecTitle>
      <Inp type="tel" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="Teléfono"/>
      <Inp type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="Correo electrónico"/>
      <Inp value={form.facebook} onChange={e=>setForm({...form,facebook:e.target.value})} placeholder="Facebook (URL o usuario)"/>
      <Inp value={form.instagram} onChange={e=>setForm({...form,instagram:e.target.value})} placeholder="Instagram (URL o usuario)"/>
      <Toggle value={form.deceased||false} onChange={v=>setForm({...form,deceased:v})} labelA="Vivo/a" labelB="Fallecido/a"/>
      {form.deceased&&<><SecTitle>Fallecimiento</SecTitle>
        <Inp type="date" value={form.deathDate} onChange={e=>setForm({...form,deathDate:e.target.value})}/>
        <Inp value={form.deathPlace} onChange={e=>setForm({...form,deathPlace:e.target.value})} placeholder="Lugar donde descansan sus restos"/>
      </>}
      <SecTitle>Padres</SecTitle>
      <Sel value={form.parent1Id} onChange={e=>setForm({...form,parent1Id:e.target.value})}>
        <option value="">Padre/Madre 1 — Ninguno</option>
        {members.filter(m=>m.id!==sel&&(!form.birthDate||!m.birthDate||m.birthDate<form.birthDate||m.deceased)).map(m=><option key={m.id} value={m.id}>{getDisplay(m).full}</option>)}
      </Sel>
      <Sel value={form.parent2Id} onChange={e=>setForm({...form,parent2Id:e.target.value})}>
        <option value="">Padre/Madre 2 — Ninguno</option>
        {members.filter(m=>m.id!==sel&&m.id!==form.parent1Id&&(!form.birthDate||!m.birthDate||m.birthDate<form.birthDate||m.deceased)).map(m=><option key={m.id} value={m.id}>{getDisplay(m).full}</option>)}
      </Sel>
      <button onClick={saveForm} style={{width:"100%",marginTop:16,padding:"14px 0",background:"#007AFF",border:"none",borderRadius:12,color:"#fff",fontSize:17,fontWeight:600,cursor:"pointer"}}>
        {panel==="add"?"Agregar":"Guardar cambios"}
      </button>
    </div>)}

    {/* Partners */}
    {panel==="partners"&&selM&&sheet("Parejas de "+getDisplay(selM).first,close,<div style={{display:"flex",flexDirection:"column",gap:12}}>
      {selM.partnerships.map(pr=>{const p=members.find(m=>m.id===pr.partnerId);if(!p)return null;
        return <div key={pr.partnerId} style={{background:"#fff",borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <Avatar photo={p.photo} name={getDisplay(p).full} size={40} gender={p.gender}/>
            <div><div style={{fontWeight:600}}>{getDisplay(p).full}</div><div style={{fontSize:12,color:pr.type==="actual"?"#34C759":"#888"}}>{pr.type==="actual"?"Pareja actual":"Ex pareja"}</div></div>
          </div>
          <button onClick={()=>removePartner(pr.partnerId)} style={{width:28,height:28,borderRadius:14,background:"rgba(120,120,128,0.12)",border:"none",color:"#FF3B30",fontSize:16,fontWeight:700,cursor:"pointer"}}>×</button>
        </div>;})}
      <SecTitle>Agregar pareja</SecTitle>
      <Sel value={pForm.partnerId} onChange={e=>setPForm({...pForm,partnerId:e.target.value})}>
        <option value="">Seleccionar persona…</option>
        {members.filter(m=>m.id!==sel&&!selM.partnerships.find(x=>x.partnerId===m.id)).map(m=><option key={m.id} value={m.id}>{getDisplay(m).full}</option>)}
      </Sel>
      <Sel value={pForm.type} onChange={e=>setPForm({...pForm,type:e.target.value})}>
        <option value="actual">Pareja actual</option>
        <option value="anterior">Ex pareja</option>
      </Sel>
      <button onClick={addPartner} disabled={!pForm.partnerId} style={{width:"100%",padding:"12px 0",background:pForm.partnerId?"#007AFF":"rgba(120,120,128,0.12)",border:"none",borderRadius:12,color:pForm.partnerId?"#fff":"#999",fontSize:16,fontWeight:600,cursor:pForm.partnerId?"pointer":"default"}}>Agregar pareja</button>
    </div>)}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
