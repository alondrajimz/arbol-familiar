<script type="text/babel">
const {useState,useEffect,useRef}=React;

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmt=d=>{if(!d)return"";const[y,m,dd]=d.split("-");return`${dd}/${m}/${y}`;};
function calcAge(b,d,dead){
  if(!b)return null;const bd=new Date(b),ref=dead&&d?new Date(d):new Date();
  let a=ref.getFullYear()-bd.getFullYear();
  if(ref.getMonth()<bd.getMonth()||(ref.getMonth()===bd.getMonth()&&ref.getDate()<bd.getDate()))a--;
  return a>=0?a:null;
}
const PK="fp4";
const savePhotos=map=>localStorage.setItem(PK,JSON.stringify(map));

function autoLayout(members){
  if(!members.length)return[];
  const by={};members.forEach(m=>by[m.id]=m);
  const gen={};
  members.forEach(m=>{if(!m.parent1Id&&!m.parent2Id)gen[m.id]=0;});
  let chg=true;
  while(chg){chg=false;members.forEach(m=>{
    if(gen[m.id]!=null)return;
    const gs=[m.parent1Id,m.parent2Id].filter(Boolean).map(id=>gen[id]).filter(g=>g!=null);
    if(gs.length){gen[m.id]=Math.max(...gs)+1;chg=true;}
  });}
  members.forEach(m=>{if(gen[m.id]==null)gen[m.id]=0;});
  chg=true;while(chg){chg=false;members.forEach(m=>(m.partnerships||[]).forEach(pr=>{
    if(gen[pr.partnerId]==null)return;
    const g=Math.min(gen[m.id],gen[pr.partnerId]);
    if(gen[m.id]!==g){gen[m.id]=g;chg=true;}
    if(gen[pr.partnerId]!==g){gen[pr.partnerId]=g;chg=true;}
  }));}
  chg=true;while(chg){chg=false;members.forEach(m=>{
    const gs=[m.parent1Id,m.parent2Id].filter(Boolean).map(id=>gen[id]).filter(g=>g!=null);
    if(!gs.length)return;const n=Math.max(...gs)+1;
    if(gen[m.id]<n){gen[m.id]=n;chg=true;}
  });}
  const XG=170,YG=200,YT=100;
  const maxG=Math.max(...Object.values(gen),0);
  const pos={};
  const kids={};members.forEach(m=>[m.parent1Id,m.parent2Id].filter(Boolean).forEach(pid=>{
    if(!kids[pid])kids[pid]=[];if(!kids[pid].includes(m.id))kids[pid].push(m.id);
  }));
  for(let g=maxG;g>=0;g--){
    const gms=members.filter(m=>gen[m.id]===g).sort((a,b)=>(a.birthDate||"").localeCompare(b.birthDate||""));
    const done=new Set();const units=[];
    gms.forEach(m=>{
      if(done.has(m.id))return;done.add(m.id);
      const pr=(m.partnerships||[]).find(p=>gen[p.partnerId]===g&&!done.has(p.partnerId));
      if(pr){const pm=by[pr.partnerId];done.add(pm.id);
        const ml=m.gender==="M"||(m.gender!=="F"&&pm.gender==="F");
        units.push(ml?[m.id,pm.id]:[pm.id,m.id]);}
      else units.push([m.id]);
    });
    let cur=100;
    units.forEach((ids,i)=>{
      const cxs=[];ids.forEach(id=>(kids[id]||[]).forEach(cid=>{if(pos[cid])cxs.push(pos[cid].x);}));
      const hint=cxs.length?cxs.reduce((a,b)=>a+b)/cxs.length:null;
      const y=YT+g*YG;
      if(ids.length===2){
        const half=XG*0.55;
        const cx=Math.max(hint!=null?hint:cur+half,cur+half);
        pos[ids[0]]={x:cx-half,y};pos[ids[1]]={x:cx+half,y};cur=cx+half+XG*0.4;
      } else {
        const x=Math.max(hint!=null?hint:cur,cur);
        pos[ids[0]]={x,y};cur=x+XG;
      }
    });
  }
  return members.map(m=>({...m,...(pos[m.id]||{x:100,y:YT})}));
}

function Lines({members}){
  const by={};members.forEach(m=>by[m.id]=m);
  const segs=[];const drawn=new Set();
  members.forEach(m=>(m.partnerships||[]).forEach(pr=>{
    const key=[m.id,pr.partnerId].sort().join("-");
    if(drawn.has(key))return;drawn.add(key);
    const sp=by[pr.partnerId];if(!sp||Math.abs(m.y-sp.y)>5)return;
    const isEx=pr.type==="anterior";
    const x1=Math.min(m.x,sp.x)+38,x2=Math.max(m.x,sp.x)-38;
    if(x1>=x2)return;
    segs.push(<line key={`pt-${key}`} x1={x1} y1={m.y} x2={x2} y2={m.y}
      stroke={isEx?"#ddd":"#bbb"} strokeWidth={2} strokeDasharray={isEx?"8 5":"none"}/>);
  }));
  const fams={};
  members.forEach(m=>{
    if(!m.parent1Id&&!m.parent2Id)return;
    const fk=[m.parent1Id||"_",m.parent2Id||"_"].sort().join("|");
    if(!fams[fk])fams[fk]={p1:m.parent1Id,p2:m.parent2Id,ch:[]};
    fams[fk].ch.push(m);
  });
  Object.entries(fams).forEach(([fk,{p1,p2,ch}])=>{
    const pa=by[p1],pb=by[p2];if(!ch.length)return;
    const px=pa&&pb?(pa.x+pb.x)/2:pa?pa.x:pb?pb.x:0;
    const py=(pa||pb).y;
    const cy=ch[0].y;
    const exitY=py+42,entryY=cy-48,barY=(exitY+entryY)/2;
    const xs=ch.map(c=>c.x);
    const bx1=Math.min(px,...xs),bx2=Math.max(px,...xs);
    segs.push(<line key={`v1-${fk}`} x1={px} y1={exitY} x2={px} y2={barY} stroke="#bbb" strokeWidth={2}/>);
    segs.push(<line key={`bh-${fk}`} x1={bx1} y1={barY} x2={bx2} y2={barY} stroke="#bbb" strokeWidth={2}/>);
    ch.forEach(c=>segs.push(<line key={`v2-${c.id}`} x1={c.x} y1={barY} x2={c.x} y2={entryY} stroke="#bbb" strokeWidth={2}/>));
  });
  return <>{segs}</>;
}

function Node({m,photos,onTap}){
  const photo=photos[m.id];
  const a=calcAge(m.birthDate,m.deathDate,m.deceased);
  const subs=[m.lastName1,m.lastName2].filter(Boolean).join(" ");
  const alive=!m.deceased;
  return(
    <g transform={`translate(${m.x},${m.y})`} style={{cursor:"pointer"}} onClick={()=>onTap(m)}>
      <circle cx={0} cy={-15} r={36} fill={alive?"#e8f0fe":"#e8e8e8"} stroke={alive?"#4a90d9":"#aaa"} strokeWidth={2}/>
      {photo
        ?<image href={photo} x={-35} y={-50} width={70} height={70} clipPath="url(#circClip)"/>
        :<text x={0} y={-10} textAnchor="middle" dominantBaseline="middle" fontSize={32}>{m.gender==="F"?"👩":"👨"}</text>}
      <text x={0} y={34} textAnchor="middle" fontSize={13} fontWeight="700" fill={alive?"#1c1c1e":"#555"}>
        {m.deceased?"† ":""}{m.firstName||m.name||"?"}
      </text>
      {subs&&<text x={0} y={50} textAnchor="middle" fontSize={11} fill="#777">{subs}</text>}
      {a!=null&&<text x={0} y={subs?65:50} textAnchor="middle" fontSize={11} fill="#aaa">{a} años</text>}
    </g>
  );
}

const EMPTY={firstName:"",lastName1:"",lastName2:"",birthDate:"",birthPlace:"",residence:"",

    ["Facebook",m.facebook],["Instagram",m.instagram],
    m.deceased&&["Fallecimiento",fmt(m.deathDate)],m.deceased&&["Lugar de restos",m.deathPlace],
  ].filter(r=>r&&r[1]);
  const partners=(m.partnerships||[]).map(pr=>({p:by[pr.partnerId],type:pr.type})).filter(x=>x.p);
  const children=members.filter(c=>c.parent1Id===m.id||c.parent2Id===m.id);

function FormSheet({initial,members,photos,onSave,onClose}){
  const [f,setF]=useState({...EMPTY,...initial});
  const [newPhoto,setNewPhoto]=useState(null);
  const photoRef=useRef();
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const setPr=(i,k,v)=>set("partnerships",f.partnerships.map((p,j)=>j===i?{...p,[k]:v}:p));
  const handlePhoto=e=>{const file=e.target.files?.[0];if(!file)return;
    const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{
      const c=document.createElement("canvas");c.width=200;c.height=200;
      const ctx=c.getContext("2d");const s=Math.min(img.width,img.height);
      ctx.drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,200,200);
      setNewPhoto(c.toDataURL("image/jpeg",.75));
    };img.src=ev.target.result;};r.readAsDataURL(file);};
  const save=()=>{
    if(!f.firstName.trim()){alert("Ingresa el nombre");return;}
    const id=f.id||uid();
    const data={...f,id};delete data.photo;
    onSave(data,newPhoto);
  };
  const others=members.filter(m=>m.id!==f.id);
  const displayPhoto=newPhoto||(f.id?photos[f.id]:null);
  const fields=[["Nombre","firstName"],["Apellido paterno","lastName1"],["Apellido materno","lastName2"],
    ["Lugar de nacimiento","birthPlace"],["Residencia","residence"],
    ["Teléfono","phone"],["Correo","email"],["Facebook","facebook"],["Instagram","instagram"]];
  return(
    <Sheet title={f.id?"Editar persona":"Nueva persona"} onClose={onClose}>
      <div style={{textAlign:"center",marginBottom:14}}>
        <div style={{width:76,height:76,borderRadius:"50%",overflow:"hidden",margin:"0 auto",background:"#eee",cursor:"pointer"}} onClick={()=>photoRef.current.click()}>
          {displayPhoto?<img src={displayPhoto} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            :<div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36}}>{f.gender==="F"?"👩":"👨"}</div>}
        </div>
        <input ref={photoRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhoto}/>
        <div style={{fontSize:12,color:"#007AFF",marginTop:4,cursor:"pointer"}} onClick={()=>photoRef.current.click()}>Cambiar foto</div>
      </div>
      {fields.map(([l,k])=><div className="f" key={k}><label>{l}</label><input value={f[k]||""} onChange={e=>set(k,e.target.value)} placeholder={l}/></div>)}
      <div className="f"><label>Fecha de nacimiento</label><input type="date" value={f.birthDate||""} onChange={e=>set("birthDate",e.target.value)}/></div>
      <div className="f"><label>Género</label><select value={f.gender||"M"} onChange={e=>set("gender",e.target.value)}>
        <option value="M">Masculino</option><option value="F">Femenino</option>
      </select></div>
      <div className="f"><label>Estado</label><select value={f.deceased?"fallecido":"vivo"} onChange={e=>set("deceased",e.target.value==="fallecido")}>
        <option value="vivo">Vivo</option><option value="fallecido">Fallecido</option>
      </select></div>
      {f.deceased&&<><div className="f"><label>Fecha de fallecimiento</label><input type="date" value={f.deathDate||""} onChange={e=>set("deathDate",e.target.value)}/></div>
        <div className="f"><label>Lugar de restos</label><input value={f.deathPlace||""} onChange={e=>set("deathPlace",e.target.value)}/></div></>}
      <div className="f"><label>Padre</label><select value={f.parent1Id||""} onChange={e=>set("parent1Id",e.target.value)}>
        <option value="">— ninguno —</option>{others.map(m=><option key={m.id} value={m.id}>{m.firstName} {m.lastName1}</option>)}
      </select></div>
      <div className="f"><label>Madre</label><select value={f.parent2Id||""} onChange={e=>set("parent2Id",e.target.value)}>
        <option value="">— ninguno —</option>{others.map(m=><option key={m.id} value={m.id}>{m.firstName} {m.lastName1}</option>)}
      </select></div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:12,color:"#888",marginBottom:6}}>Parejas</div>
        {(f.partnerships||[]).map((pr,i)=>(
          <div key={i} style={{display:"flex",gap:6,marginBottom:8}}>
            <select value={pr.partnerId} onChange={e=>setPr(i,"partnerId",e.target.value)} style={{flex:2,padding:"9px",borderRadius:8,border:"1.5px solid #e5e5e5"}}>
              <option value="">— persona —</option>{others.map(m=><option key={m.id} value={m.id}>{m.firstName} {m.lastName1}</option>)}
            </select>
            <select value={pr.type} onChange={e=>setPr(i,"type",e.target.value)} style={{flex:1,padding:"9px",borderRadius:8,border:"1.5px solid #e5e5e5"}}>
              <option value="actual">Actual</option><option value="anterior">Ex</option>
            </select>
            <button className="btn red" style={{padding:"8px 11px"}} onClick={()=>set("partnerships",f.partnerships.filter((_,j)=>j!==i))}>✕</button>
          </div>
        ))}
        <button className="btn gray" style={{width:"100%"}} onClick={()=>set("partnerships",[...(f.partnerships||[]),{partnerId:"",type:"actual"}])}>+ Agregar pareja</button>
      </div>
      <div style={{display:"flex",gap:8,paddingTop:6}}>
        <button className="btn blue" style={{flex:1}} onClick={save}>Guardar</button>
        <button className="btn gray" onClick={onClose}>Cancelar</button>
      </div>
    </Sheet>
  );
}

function App(){
  const [members,setMembers]=useState([]);
  const [photos,setPhotos]=useState({});
  const [zoom,setZoom]=useState(1);
  const [pan,setPan]=useState({x:0,y:0});
  const [profile,setProfile]=useState(null);
  const [form,setForm]=useState(null);
  const [saving,setSaving]=useState(false);
  const panRef=useRef(null);const touchRef=useRef(null);

  useEffect(()=>{
    setPhotos(getPhotos());
    db.on("value",snap=>{
      const data=snap.val();
      console.log("Firebase snapshot:", data);
      if(!data){setMembers([]);return;}
      // Firebase converts arrays to objects {0:{...},1:{...}} — fix partnerships
      const ms=Object.entries(data).map(([key,m])=>{
        const id=m.id||key;
        let ps=m.partnerships;
        if(ps&&!Array.isArray(ps))ps=Object.values(ps);
        return {...m,id,partnerships:ps||[]};
      });
      console.log("Members parsed:", ms.length, ms);
      setMembers(ms);
    });
    return()=>db.off("value");
  },[]);

  const saveMember=(data,photo)=>{
    setSaving(true);
    const p={...getPhotos()};
    if(photo)p[data.id]=photo;
    savePhotos(p);setPhotos(p);
    db.child(data.id).set(data).then(()=>{setSaving(false);setForm(null);setProfile(null);});
  };

  const deleteMember=id=>{
    if(!confirm("¿Eliminar esta persona?"))return;
    const p={...getPhotos()};delete p[id];savePhotos(p);setPhotos(p);
    db.child(id).remove();setProfile(null);
  };

  const onMouseDown=e=>{if(e.button!==0)return;panRef.current={sx:e.clientX-pan.x,sy:e.clientY-pan.y};};
  const onMouseMove=e=>{if(!panRef.current)return;setPan({x:e.clientX-panRef.current.sx,y:e.clientY-panRef.current.sy});};
  const onMouseUp=()=>{panRef.current=null;};
  const onTouchStart=e=>{if(e.touches.length===1)touchRef.current={sx:e.touches[0].clientX-pan.x,sy:e.touches[0].clientY-pan.y};};
  const onTouchMove=e=>{if(!touchRef.current||e.touches.length!==1)return;e.preventDefault();
    setPan({x:e.touches[0].clientX-touchRef.current.sx,y:e.touches[0].clientY-touchRef.current.sy});};

  const fit=()=>{
    if(!members.length)return;
    const laid=autoLayout(members);
    const xs=laid.map(m=>m.x),ys=laid.map(m=>m.y);
    const W=window.innerWidth,H=window.innerHeight-60;
    const z=Math.min(W/(Math.max(...xs)-Math.min(...xs)+160),(H)/(Math.max(...ys)-Math.min(...ys)+160),.95);
    const cx=(Math.min(...xs)+Math.max(...xs))/2,cy=(Math.min(...ys)+Math.max(...ys))/2;
    setZoom(z);setPan({x:W/2-cx*z,y:60+(H/2-cy*z)});
  };

  const laid=autoLayout(members);
  const W=window.innerWidth,H=window.innerHeight;

  return(
    <div style={{width:"100%",height:"100%",position:"relative",background:"#F2F2F7"}}>
      <div style={{position:"fixed",top:0,left:0,right:0,height:54,background:"rgba(249,249,249,.92)",
        backdropFilter:"blur(20px)",display:"flex",alignItems:"center",padding:"0 14px",gap:7,
        zIndex:10,borderBottom:"1px solid #e0e0e0"}}>
        <span style={{fontWeight:700,fontSize:17,flex:1}}>🌳 Mi Familia</span>
        <button className="btn gray" style={{padding:"6px 13px",fontSize:14}} onClick={()=>setZoom(z=>Math.min(z+.2,3))}>+</button>
        <button className="btn gray" style={{padding:"6px 13px",fontSize:14}} onClick={()=>setZoom(z=>Math.max(z-.2,.2))}>−</button>
        <button className="btn gray" style={{padding:"6px 13px",fontSize:13}} onClick={fit}>Ajustar</button>
        <button className="btn blue" style={{padding:"6px 14px",fontSize:13}} onClick={()=>setForm({...EMPTY})}>+ Agregar</button>
      </div>
      <svg width={W} height={H}
        style={{position:"absolute",top:54,left:0,cursor:"grab",touchAction:"none"}}
        onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={()=>{touchRef.current=null;}}>
        <defs><clipPath id="circClip"><circle cx={35} cy={35} r={35}/></clipPath></defs>
        <g transform={`translate(${pan.x},${pan.y}) scale(${zoom})`}>
          <Lines members={laid}/>
          {laid.map(m=><Node key={m.id} m={m} photos={photos} onTap={setProfile}/>)}
        </g>
      </svg>
      {saving&&<div style={{position:"fixed",top:62,left:"50%",transform:"translateX(-50%)",
        background:"#007AFF",color:"#fff",padding:"5px 16px",borderRadius:20,fontSize:13,zIndex:20}}>Guardando…</div>}
      {profile&&!form&&(
        <ProfileSheet m={profile} members={laid} photos={photos}
          onEdit={()=>setForm({...members.find(m=>m.id===profile.id)||profile})}
          onDelete={()=>deleteMember(profile.id)} onClose={()=>setProfile(null)}/>
      )}
      {form&&<FormSheet initial={form} members={laid} photos={photos} onSave={saveMember} onClose={()=>setForm(null)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
