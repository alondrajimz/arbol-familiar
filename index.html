<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mi Familia">
<title>Mi Familia - Árbol Genealógico</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌳</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBW0CvCK4bS4BOwApcGyPXqcDRrvFm7w7Y",
  authDomain:"arbol-familiar-26.firebaseapp.com",
  databaseURL:"https://arbol-familiar-26-default-rtdb.firebaseio.com",
  projectId:"arbol-familiar-26",
  storageBucket:"arbol-familiar-26.firebasestorage.app",

  appId:"1:671444673579:web:78f637bb24adce2b28b66e"

const dbRef = firebase.database().ref("familyTree");
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{width:100%;height:100%;overflow:hidden}
body{font-family:'SF Pro Rounded','SF Pro Display',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#F2F2F7}
input,select,button{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useRef,useEffect}=React;
const SF="'SF Pro Rounded','SF Pro Display',-apple-system,BlinkMacSystemFont,system-ui,sans-serif";
const blur="saturate(180%) blur(20px)";
const T={bg:"#F2F2F7",card:"rgba(255,255,255,0.88)",barBg:"rgba(249,249,249,0.78)",
  fill:"rgba(120,120,128,0.12)",label:"#000",label2:"rgba(60,60,67,0.6)",label3:"rgba(60,60,67,0.3)",
  blue:"#007AFF",pink:"#FF3B30",orange:"#FF9500",green:"#34C759",sep:"rgba(60,60,67,0.12)"};

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

// Firebase helpers
function saveToDB(members){
  const data={};
  members.forEach(m=>{data[m.id]={...m};});
  dbRef.set(data);
}

function Av({photo,name,size=44,gender}){
  const ini=(name||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const g=gender==="F"?"linear-gradient(135deg,#FF2D55,#FF6482)":"linear-gradient(135deg,#007AFF,#5AC8FA)";
  return <div style={{width:size,height:size,borderRadius:size/2,flexShrink:0,
    background:photo?`url(${photo}) center/cover no-repeat`:g,
    display:"flex",alignItems:"center",justifyContent:"center",
    color:"#fff",fontSize:size*.36,fontWeight:600,fontFamily:SF,
    boxShadow:"0 1px 4px rgba(0,0,0,.12)"}}>{!photo&&ini}</div>;
}

function Node({m,sel,onSel,onDrag}){
  const ref=useRef(null);const dr=useRef(false);const off=useRef({x:0,y:0});
  const down=e=>{e.stopPropagation();dr.current=true;off.current={x:e.clientX-m.x,y:e.clientY-m.y};ref.current?.setPointerCapture(e.pointerId);};
  const move=e=>{if(dr.current)onDrag(m.id,e.clientX-off.current.x,e.clientY-off.current.y);};
  const up=e=>{dr.current=false;ref.current?.releasePointerCapture(e.pointerId);};
  const isSel=sel===m.id;
  const sub=[m.birthDate,m.birthPlace].filter(Boolean).join(" · ");
  const pCount=(m.partnerships||[]).length;
  return (
    <foreignObject x={m.x-80} y={m.y-44} width={160} height={88}>
      <div ref={ref} onPointerDown={down} onPointerMove={move} onPointerUp={up}
        onClick={e=>{e.stopPropagation();onSel(m.id);}}
        style={{width:160,height:88,borderRadius:20,
          background:isSel?"rgba(0,122,255,0.08)":T.card,
          backdropFilter:blur,WebkitBackdropFilter:blur,
          border:isSel?"2px solid rgba(0,122,255,0.4)":`0.5px solid ${T.sep}`,
          display:"flex",alignItems:"center",gap:10,padding:"0 12px",
          cursor:"grab",transition:"all .2s",boxSizing:"border-box",
          boxShadow:isSel?"0 2px 12px rgba(0,122,255,0.15)":"0 1px 4px rgba(0,0,0,0.06)"}}>
        <Av photo={m.photo} name={m.name} size={44} gender={m.gender}/>
        <div style={{minWidth:0,flex:1}}>
          <div style={{color:T.label,fontSize:13.5,fontWeight:600,fontFamily:SF,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.name}</div>
          {sub&&<div style={{color:T.label3,fontSize:10,fontFamily:SF,marginTop:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{sub}</div>}
          {pCount>1&&<div style={{color:T.label2,fontSize:9.5,fontFamily:SF,marginTop:1}}>{pCount} parejas</div>}
        </div>
      </div>
    </foreignObject>
  );
}

function Lines({members}){
  const p=[];const drawn=new Set();
  members.forEach(m=>{
    (m.partnerships||[]).forEach(pr=>{
      const key=[m.id,pr.partnerId].sort().join("-");
      if(drawn.has(key))return;drawn.add(key);
      const sp=members.find(x=>x.id===pr.partnerId);if(!sp)return;
      const isEx=pr.type==="anterior";
      p.push(<line key={`p-${key}`} x1={m.x+80} y1={m.y} x2={sp.x-80} y2={sp.y}
        stroke={isEx?"rgba(160,160,170,0.3)":"rgba(255,45,85,0.25)"} strokeWidth={isEx?1:1.3}
        strokeDasharray={isEx?"5 4":"none"}/>);
      const mx=(m.x+sp.x)/2,my=(m.y+sp.y)/2;
      p.push(<text key={`pl-${key}`} x={mx} y={my-6} textAnchor="middle"
        fill={isEx?"rgba(160,160,170,0.5)":"rgba(255,45,85,0.4)"} fontSize={9} fontFamily={SF}>{isEx?"ex":"♥"}</text>);
    });
  });
  members.forEach(m=>{
    const p1=m.parent1Id?members.find(x=>x.id===m.parent1Id):null;
    const p2=m.parent2Id?members.find(x=>x.id===m.parent2Id):null;
    let fx,fy;
    if(p1&&p2){fx=(p1.x+p2.x)/2;fy=Math.max(p1.y,p2.y)+44;}
    else if(p1){fx=p1.x;fy=p1.y+44;}
    else if(p2){fx=p2.x;fy=p2.y+44;}
    else return;
    const tx=m.x,ty=m.y-44,my2=(fy+ty)/2;
    p.push(<path key={`c-${m.id}`} d={`M${fx},${fy} C${fx},${my2} ${tx},${my2} ${tx},${ty}`}
      stroke="rgba(0,122,255,0.2)" strokeWidth={1.5} fill="none"/>);
  });
  return <>{p}</>;
}

function PhotoUp({photo,gender,name,onUp}){
  const inp=useRef(null);
  const go=e=>{const f=e.target.files?.[0];if(!f)return;
    // Compress image to avoid Firebase size issues
    const img=new Image();const reader=new FileReader();
    reader.onload=ev=>{
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        const max=200;let w=img.width,h=img.height;
        if(w>h){if(w>max){h=h*(max/w);w=max;}}else{if(h>max){w=w*(max/h);h=max;}}
        canvas.width=w;canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        onUp(canvas.toDataURL("image/jpeg",0.7));
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(f);
  };
  return (
    <div onClick={()=>inp.current?.click()} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,cursor:"pointer",padding:8}}>
      <div style={{position:"relative"}}>
        <Av photo={photo} name={name||"?"} size={80} gender={gender}/>
        <div style={{position:"absolute",bottom:-2,right:-2,width:26,height:26,borderRadius:13,background:T.blue,
          display:"flex",alignItems:"center",justifyContent:"center",border:"2.5px solid #F2F2F7"}}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round">
            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/>
          </svg>
        </div>
      </div>
      <span style={{color:T.blue,fontSize:13,fontWeight:500,fontFamily:SF}}>{photo?"Cambiar foto":"Agregar foto"}</span>
      <input ref={inp} type="file" accept="image/*" onChange={go} style={{display:"none"}}/>
    </div>
  );
}

function Toggle({value,onChange}){
  return <div style={{display:"flex",background:T.fill,borderRadius:9,padding:2}}>
    {[{l:"Masculino",v:"M"},{l:"Femenino",v:"F"}].map(o=>
      <button key={o.v} onClick={()=>onChange(o.v)} style={{flex:1,padding:"7px 0",border:"none",borderRadius:7,
        background:o.v===value?"#FFF":"transparent",color:o.v===value?T.label:T.label2,
        fontSize:13,fontWeight:500,fontFamily:SF,cursor:"pointer",
        boxShadow:o.v===value?"0 1px 3px rgba(0,0,0,.08)":"none",transition:"all .2s"}}>{o.l}</button>)}
  </div>;
}
function Inp({value,onChange,placeholder}){
  return <input value={value} onChange={onChange} placeholder={placeholder} style={{
    width:"100%",padding:"11px 0",background:"transparent",border:"none",
    color:T.label,fontSize:16,fontFamily:SF,outline:"none",boxSizing:"border-box"}}/>;
}
function Sel({value,onChange,children}){
  return <select value={value} onChange={onChange} style={{
    width:"100%",padding:"11px 0",background:"transparent",border:"none",
    color:T.label,fontSize:16,fontFamily:SF,outline:"none",boxSizing:"border-box",appearance:"none"}}>{children}</select>;
}

function App(){
  const [members,setMembers]=useState([]);
  const [sel,setSel]=useState(null);
  const [panel,setPanel]=useState(null);
  const [form,setForm]=useState({name:"",birthDate:"",birthPlace:"",gender:"M",parent1Id:"",parent2Id:"",photo:null});
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState(null);
  const [pForm,setPForm]=useState({partnerId:"",type:"actual"});
  const saveTimer=useRef(null);
  const isLocalUpdate=useRef(false);

  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(null),1800);};

  // Listen to Firebase in realtime
  useEffect(()=>{
    const unsub=dbRef.on("value",(snapshot)=>{
      if(isLocalUpdate.current){isLocalUpdate.current=false;return;}
      const val=snapshot.val();
      if(val){
        const arr=Object.values(val).map(m=>({...m,partnerships:m.partnerships||[]}));
        setMembers(arr);
      }
      setLoading(false);
    });
    return ()=>dbRef.off("value",unsub);
  },[]);

  const update=useCallback((fn)=>{
    setMembers(prev=>{
      const next=typeof fn==="function"?fn(prev):fn;
      if(saveTimer.current)clearTimeout(saveTimer.current);
      saveTimer.current=setTimeout(()=>{
        isLocalUpdate.current=true;
        saveToDB(next);
        showToast("Guardado ✓");
      },800);
      return next;
    });
  },[]);

  const drag=useCallback((id,x,y)=>update(p=>p.map(m=>m.id===id?{...m,x,y}:m)),[update]);
  const selM=members.find(m=>m.id===sel);
  const selPartnerships=selM?.partnerships||[];

  const openAdd=()=>{setForm({name:"",birthDate:"",birthPlace:"",gender:"M",parent1Id:sel||"",parent2Id:"",photo:null});setPanel("add");};
  const openEdit=()=>{if(!selM)return;setForm({name:selM.name,birthDate:selM.birthDate||"",birthPlace:selM.birthPlace||"",gender:selM.gender,parent1Id:selM.parent1Id||"",parent2Id:selM.parent2Id||"",photo:selM.photo});setPanel("edit");};
  const openPartnerships=()=>{if(!selM)return;setPForm({partnerId:"",type:"actual"});setPanel("partnerships");};

  const save=()=>{
    if(!form.name.trim())return;
    if(panel==="add"){
      const p1=members.find(m=>m.id===form.parent1Id);
      const n={id:genId(),name:form.name.trim(),birthDate:form.birthDate,birthPlace:form.birthPlace,gender:form.gender,
        parent1Id:form.parent1Id||null,parent2Id:form.parent2Id||null,partnerships:[],photo:form.photo,
        x:p1?p1.x+(Math.random()-.5)*100:400,y:p1?p1.y+200:100};
      update(p=>[...p,n]);
    } else if(sel){
      update(p=>p.map(m=>m.id===sel?{...m,name:form.name.trim(),birthDate:form.birthDate,birthPlace:form.birthPlace,
        gender:form.gender,parent1Id:form.parent1Id||null,parent2Id:form.parent2Id||null,photo:form.photo}:m));
    }
    setPanel(null);
  };

  const addPartnership=()=>{
    if(!sel||!pForm.partnerId)return;
    update(p=>p.map(m=>{
      if(m.id===sel){const ps=[...(m.partnerships||[])];if(!ps.find(x=>x.partnerId===pForm.partnerId))ps.push({partnerId:pForm.partnerId,type:pForm.type});return{...m,partnerships:ps};}
      if(m.id===pForm.partnerId){const ps=[...(m.partnerships||[])];if(!ps.find(x=>x.partnerId===sel))ps.push({partnerId:sel,type:pForm.type});return{...m,partnerships:ps};}
      return m;
    }));
    setPForm({partnerId:"",type:"actual"});
  };

  const removePartnership=(partnerId)=>{
    if(!sel)return;
    update(p=>p.map(m=>{
      if(m.id===sel)return{...m,partnerships:(m.partnerships||[]).filter(x=>x.partnerId!==partnerId)};
      if(m.id===partnerId)return{...m,partnerships:(m.partnerships||[]).filter(x=>x.partnerId!==sel)};
      return m;
    }));
  };

  const remove=()=>{
    if(!sel||!confirm("¿Eliminar a "+selM?.name+"?"))return;
    update(p=>p.filter(m=>m.id!==sel).map(m=>({...m,
      parent1Id:m.parent1Id===sel?null:m.parent1Id,
      parent2Id:m.parent2Id===sel?null:m.parent2Id,
      partnerships:(m.partnerships||[]).filter(x=>x.partnerId!==sel)})));
    setSel(null);setPanel(null);
  };

  const pill=(label,color,action)=>(
    <button onClick={action} style={{padding:"7px 16px",background:color,border:"none",borderRadius:100,
      color:"#fff",fontSize:13,fontWeight:600,fontFamily:SF,cursor:"pointer",transition:"transform .1s",
      boxShadow:`0 2px 8px ${color}44`}}
      onPointerDown={e=>e.currentTarget.style.transform="scale(0.95)"}
      onPointerUp={e=>e.currentTarget.style.transform="scale(1)"}>{label}</button>
  );

  const rowStyle={padding:"2px 16px",borderBottom:`0.5px solid ${T.sep}`};
  const secTitle=t=><div style={{color:T.label2,fontSize:12,fontWeight:500,fontFamily:SF,paddingLeft:4,marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>{t}</div>;

  if(loading) return (
    <div style={{width:"100%",height:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,fontFamily:SF}}>
      <span style={{fontSize:48}}>🌳</span>
      <span style={{color:T.label2,fontSize:16}}>Cargando árbol familiar…</span>
    </div>
  );

  return (
    <div style={{width:"100%",height:"100vh",background:T.bg,fontFamily:SF,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>

      {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:200,
        background:"rgba(0,0,0,0.75)",backdropFilter:blur,color:"#fff",padding:"10px 24px",borderRadius:100,
        fontSize:14,fontWeight:500,fontFamily:SF,boxShadow:"0 4px 16px rgba(0,0,0,.2)",
        animation:"fadeIn .25s ease"}}>{toast}</div>}

      <div style={{padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",
        background:T.barBg,backdropFilter:blur,WebkitBackdropFilter:blur,
        borderBottom:`0.5px solid ${T.sep}`,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:26}}>🌳</span>
          <div>
            <div style={{fontSize:20,fontWeight:700,color:T.label,letterSpacing:-.4}}>Mi Familia</div>
            <div style={{fontSize:12,color:T.label2}}>{members.length} personas · En línea</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
          {pill("＋ Agregar",T.blue,openAdd)}
          {sel&&pill("Parejas",T.green,openPartnerships)}
          {sel&&pill("Editar",T.orange,openEdit)}
          {sel&&pill("Eliminar",T.pink,remove)}
        </div>
      </div>

      <div style={{padding:"6px 20px 4px",color:T.label3,fontSize:11.5,fontFamily:SF}}>
        Arrastra para mover · Toca para seleccionar · Los cambios se sincronizan en tiempo real
      </div>

      <div style={{flex:1,overflow:"auto",background:T.bg}}>
        <svg width="1400" height="1000" onClick={()=>setSel(null)} style={{display:"block"}}>
          <Lines members={members}/>
          {members.map(m=><Node key={m.id} m={m} sel={sel} onSel={setSel} onDrag={drag}/>)}
        </svg>
      </div>

      {panel&&<>
        <div onClick={()=>setPanel(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.3)",zIndex:50}}/>
        <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:60,
          background:"#F2F2F7",borderRadius:"14px 14px 0 0",maxHeight:"90vh",overflowY:"auto",
          paddingBottom:"env(safe-area-inset-bottom, 20px)",
          animation:"sheetUp .32s cubic-bezier(.32,.72,0,1)"}}>

          <div style={{display:"flex",justifyContent:"center",padding:"10px 0 2px"}}>
            <div style={{width:36,height:5,borderRadius:3,background:"rgba(60,60,67,0.15)"}}/>
          </div>

          {(panel==="add"||panel==="edit")&&<>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 20px 10px"}}>
              <button onClick={()=>setPanel(null)} style={{background:"none",border:"none",color:T.blue,fontSize:17,fontFamily:SF,cursor:"pointer"}}>Cancelar</button>
              <span style={{color:T.label,fontSize:17,fontWeight:600,fontFamily:SF}}>{panel==="add"?"Nuevo Familiar":"Editar"}</span>
              <button onClick={save} style={{background:"none",border:"none",color:T.blue,fontSize:17,fontWeight:600,fontFamily:SF,cursor:"pointer"}}>Listo</button>
            </div>
            <div style={{padding:"0 20px 28px",display:"flex",flexDirection:"column",gap:16}}>
              <PhotoUp photo={form.photo} gender={form.gender} name={form.name} onUp={d=>setForm({...form,photo:d})}/>
              <Toggle value={form.gender} onChange={v=>setForm({...form,gender:v})}/>
              <div>
                {secTitle("Información")}
                <div style={{background:"#FFF",borderRadius:12,overflow:"hidden",boxShadow:"0 0 0 0.5px rgba(0,0,0,0.04)"}}>
                  <div style={rowStyle}><Inp value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Nombre completo"/></div>
                  <div style={rowStyle}><Inp value={form.birthDate} onChange={e=>setForm({...form,birthDate:e.target.value})} placeholder="Fecha de nacimiento (ej: 15/06/1990)"/></div>
                  <div style={{...rowStyle,borderBottom:"none"}}><Inp value={form.birthPlace} onChange={e=>setForm({...form,birthPlace:e.target.value})} placeholder="Lugar de nacimiento"/></div>
                </div>
              </div>
              <div>
                {secTitle("Padres")}
                <div style={{background:"#FFF",borderRadius:12,overflow:"hidden",boxShadow:"0 0 0 0.5px rgba(0,0,0,0.04)"}}>
                  <div style={rowStyle}>
                    <Sel value={form.parent1Id} onChange={e=>setForm({...form,parent1Id:e.target.value})}>
                      <option value="">Padre/Madre 1 — Ninguno</option>
                      {members.filter(m=>m.id!==sel).map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
                    </Sel>
                  </div>
                  <div style={{...rowStyle,borderBottom:"none"}}>
                    <Sel value={form.parent2Id} onChange={e=>setForm({...form,parent2Id:e.target.value})}>
                      <option value="">Padre/Madre 2 — Ninguno</option>
                      {members.filter(m=>m.id!==sel&&m.id!==form.parent1Id).map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
                    </Sel>
                  </div>
                </div>
                <div style={{color:T.label3,fontSize:11,fontFamily:SF,paddingLeft:4,marginTop:6}}>
                  Selecciona ambos padres para conectar correctamente a medios hermanos.
                </div>
              </div>
            </div>
          </>}

          {panel==="partnerships"&&selM&&<>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 20px 10px"}}>
              <button onClick={()=>setPanel(null)} style={{background:"none",border:"none",color:T.blue,fontSize:17,fontFamily:SF,cursor:"pointer"}}>Cerrar</button>
              <span style={{color:T.label,fontSize:17,fontWeight:600,fontFamily:SF}}>Parejas de {selM.name}</span>
              <div style={{width:60}}/>
            </div>
            <div style={{padding:"0 20px 28px",display:"flex",flexDirection:"column",gap:16}}>
              {selPartnerships.length>0&&<div>
                {secTitle("Parejas registradas")}
                <div style={{background:"#FFF",borderRadius:12,overflow:"hidden",boxShadow:"0 0 0 0.5px rgba(0,0,0,0.04)"}}>
                  {selPartnerships.map((pr,i)=>{
                    const partner=members.find(m=>m.id===pr.partnerId);if(!partner)return null;
                    return <div key={pr.partnerId} style={{...rowStyle,borderBottom:i<selPartnerships.length-1?`0.5px solid ${T.sep}`:"none",
                      display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <Av photo={partner.photo} name={partner.name} size={36} gender={partner.gender}/>
                        <div>
                          <div style={{color:T.label,fontSize:15,fontWeight:500,fontFamily:SF}}>{partner.name}</div>
                          <div style={{color:pr.type==="actual"?T.green:T.label3,fontSize:12,fontFamily:SF,fontWeight:500}}>
                            {pr.type==="actual"?"Pareja actual":"Ex pareja"}</div>
                        </div>
                      </div>
                      <button onClick={()=>removePartnership(pr.partnerId)} style={{background:T.fill,border:"none",borderRadius:100,
                        width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:T.pink,fontSize:16,fontWeight:700}}>×</button>
                    </div>;
                  })}
                </div>
              </div>}
              <div>
                {secTitle("Agregar pareja")}
                <div style={{background:"#FFF",borderRadius:12,overflow:"hidden",boxShadow:"0 0 0 0.5px rgba(0,0,0,0.04)"}}>
                  <div style={rowStyle}>
                    <Sel value={pForm.partnerId} onChange={e=>setPForm({...pForm,partnerId:e.target.value})}>
                      <option value="">Seleccionar persona…</option>
                      {members.filter(m=>m.id!==sel&&!selPartnerships.find(x=>x.partnerId===m.id)).map(m=>
                        <option key={m.id} value={m.id}>{m.name}</option>)}
                    </Sel>
                  </div>
                  <div style={{...rowStyle,borderBottom:"none"}}>
                    <Sel value={pForm.type} onChange={e=>setPForm({...pForm,type:e.target.value})}>
                      <option value="actual">Pareja actual</option>
                      <option value="anterior">Ex pareja</option>
                    </Sel>
                  </div>
                </div>
                <button onClick={addPartnership} disabled={!pForm.partnerId}
                  style={{marginTop:12,width:"100%",padding:"12px 0",background:pForm.partnerId?T.blue:T.fill,
                    border:"none",borderRadius:12,color:pForm.partnerId?"#fff":T.label3,
                    fontSize:16,fontWeight:600,fontFamily:SF,cursor:pForm.partnerId?"pointer":"default"}}>
                  Agregar pareja
                </button>
              </div>
              <div style={{color:T.label3,fontSize:12,fontFamily:SF,padding:"0 4px",lineHeight:1.5}}>
                Las parejas actuales se muestran con línea continua ♥ y las ex parejas con línea punteada.
              </div>
            </div>
          </>}
        </div>
      </>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
